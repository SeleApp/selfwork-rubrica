<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rubrica</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
  </head>
  <body class="bg-light">
    <div class="container text-center py-4">
      <h1 class="mb-4">Rubrica</h1>

      <div class="row g-3 justify-content-center mb-3">
        <div class="col-sm-5 col-md-4">
          <input id="nameInput" class="form-control" type="text" placeholder="Nome" />
        </div>
        <div class="col-sm-5 col-md-4">
          <input id="numberInput" class="form-control" type="number" placeholder="Numero" />
        </div>
      </div>

      <div class="d-flex flex-wrap gap-2 justify-content-center mb-4">
        <button id="btnShow" type="button" class="btn btn-outline-secondary">Mostra contatti</button>
        <button id="btnAdd" type="button" class="btn btn-primary">Aggiungi contatto</button>
        <button id="btnRemove" type="button" class="btn btn-danger">Rimuovi contatto</button>
        <button id="btnEdit" type="button" class="btn btn-warning text-dark">Modifica contatto</button>
      </div>

      <div class="containerContact"></div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
